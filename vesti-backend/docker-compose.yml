version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    networks:
      - vesti-network
    depends_on:
      - auth-service
      - wardrobe-service
      - ai-service
      - weather-service
      - marketplace-service
      - messaging-service

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vesti_auth?schema=public
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - vesti-network

  wardrobe-service:
    build:
      context: ./wardrobe-service
      dockerfile: Dockerfile
    env_file:
      - ./wardrobe-service/.env
    networks:
      - vesti-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    env_file:
      - ./ai-service/.env
    networks:
      - vesti-network

  weather-service:
    build:
      context: ./weather-service
      dockerfile: Dockerfile
    env_file:
      - ./weather-service/.env
    networks:
      - vesti-network

  marketplace-service:
    build:
      context: ./marketplace-service
      dockerfile: Dockerfile
    env_file:
      - ./marketplace-service/.env
    networks:
      - vesti-network

  messaging-service:
    build:
      context: ./messaging-service
      dockerfile: Dockerfile
    env_file:
      - ./messaging-service/.env
    networks:
      - vesti-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vesti_auth
    ports:
      - "5432:5432"
    volumes:
      - vesti_pg_data:/var/lib/postgresql/data
    networks:
      - vesti-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - vesti-network

volumes:
  vesti_pg_data:


networks:
  vesti-network:
    driver: bridge
